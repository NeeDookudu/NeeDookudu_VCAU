name: Hourly Village Cinemas Analytics

on:
  schedule:
    # Runs at the top of every hour
    - cron: '0 * * * *'
  workflow_dispatch: # Allows manual trigger

permissions:
  contents: write # Required to commit data back to the repo

jobs:
  scrape-and-update:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11' 

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install aiohttp

      - name: Run VCR Script (Live Sales)
        env:
          VILLAGE_COOKIES: ${{ secrets.VILLAGE_COOKIES }}
        run: |
          python VCR.py --out ./data

      - name: Wait for 8 Minute Gap
        run: |
          # 8 minutes * 60 seconds = 480 seconds
          echo "Entering 8-minute cooldown period..."
          sleep 480

      - name: Run VCA Script (Advance Sales)
        env:
          VILLAGE_COOKIES: ${{ secrets.VILLAGE_COOKIES }}
        run: |
          python VCA.py --out ./data

      - name: Commit and Push All Data
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add ./data/
          
          # Only commit if there are actual changes to the JSON files
          git diff --quiet && git diff --staged --quiet || (git commit -m "📊 Auto-update: VCR and VCA data [skip ci]" && git push)
