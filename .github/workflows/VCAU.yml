name: Hourly Village Cinemas Analytics

on:
  schedule:
    - cron: '0 * * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  scrape-and-update:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11' 

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install aiohttp

      - name: Run VCR Script
        env:
          VILLAGE_COOKIES: ${{ secrets.VILLAGE_COOKIES }}
        run: |
          python VCR.py --out ./data

      - name: Wait for Time Gap
        run: |
          # Set the duration here (e.g., 60s for 1 minute, 300s for 5 minutes)
          echo "Waiting for 60 seconds before running VCA..."
          sleep 60

      - name: Run VCA Script
        env:
          VILLAGE_COOKIES: ${{ secrets.VILLAGE_COOKIES }}
        run: |
          # Ensure VCA.py exists and handles the same output directory
          python VCA.py --out ./data

      - name: Commit and Push Data
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add ./data/
          
          git diff --quiet && git diff --staged --quiet || (git commit -m "📊 Auto-update VCR and VCA data [skip ci]" && git push)
